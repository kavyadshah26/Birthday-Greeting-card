<!DOCTYPE html>
<html>
<head>
<title>session 22</title>
<style>
    body{
    background-image: url(https://wallpaperaccess.com/full/3939601.jpg);
    background-repeat: no-repeat;
    background-size: cover;
}

h1{
    background-color: rgba(23, 109, 138, 0.747);
    text-align: center;
    color: aliceblue;
    padding: 20px;
}

div{
    width: 200px;
    height: 50px;
    background-color: rgba(57, 161, 163, 0.911);
    font-weight: bold;
    position: relative;
    font-size: 30px;
    margin-bottom: 10px;
    text-align: center;
    animation: Kavya 5s;
    animation-fill-mode: forwards;
    color: aliceblue;
}
#div1{
    animation-timing-function: linear;
}
#div2{
    animation-timing-function: ease;
}
#div3{
    animation-timing-function:ease-in;
}
#div4{
    animation-timing-function: ease-in-out;
}
@keyframes Kavya{
    from{left: 0px;}
    to{left: 750px;}
}
    </style>
</head>
<body>
<h1>It's Kavya's 12th Birthday</h1>
<div id="div1">HAPPY</div>
<div id="div2">BIRTHDAY</div>
<div id="div3">TO</div>
<div id="div4">YOU</div>
</body>
</html>
